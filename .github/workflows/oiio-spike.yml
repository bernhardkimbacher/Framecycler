name: OIIO Spike

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/oiio_spike.py"
      - ".github/workflows/oiio-spike.yml"
      - "requirements-oiio-spike.txt"
      - "requirements.txt"
      - "src/framecycler/decoders/image_io.py"
      - "src/framecycler/decoders/exr_decoder.py"
      - "src/framecycler/decoders/dpx_decoder.py"
      - "tests/test_image_io.py"
      - "tests/test_decoders_oiio.py"
      - "tests/oiio_fixtures.py"

jobs:
  spike:
    name: OIIO spike (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, macos-14, ubuntu-22.04]
        include:
          - os: windows-2022
            python: python
          - os: macos-14
            python: python3
          - os: ubuntu-22.04
            python: python3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install spike dependencies
        run: |
          ${{ matrix.python }} -m pip install --upgrade pip
          ${{ matrix.python }} -m pip install -r requirements-oiio-spike.txt

      - name: Run OIIO spike
        run: ${{ matrix.python }} scripts/oiio_spike.py

      - name: Run OIIO unit tests
        run: ${{ matrix.python }} -m unittest tests.test_image_io tests.test_decoders_oiio -v
