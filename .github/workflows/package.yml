name: Package Framecycler

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish to GitHub Releases (only runs when this workflow is started from a v* tag ref, not master)
        type: boolean
        default: true
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      VPK_PACK_ID: framecycler-reboot
      VPK_PACK_TITLE: Framecycler-Reboot
      VPK_BUNDLE_ID: com.bernhardkimbacher.framecycler-reboot
      VCPKG_INSTALLATION_ROOT: C:\vcpkg
    strategy:
      fail-fast: true
      matrix:
        os: [windows-2022, macos-14, ubuntu-22.04]
        include:
          - os: windows-2022
            ext: "pyd"
            python: "python"
            vpk_channel: win
          - os: macos-14
            ext: "so"
            python: "python3"
            vpk_channel: osx
          - os: ubuntu-22.04
            ext: "so"
            python: "python3"
            vpk_channel: linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Derive release version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.1-dev.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Derived version: $VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-x11-0 libopenimageio-dev

      - name: Install System Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install openimageio

      - name: Cache vcpkg (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
            ${{ env.VCPKG_INSTALLATION_ROOT }}/downloads
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install System Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: vcpkg install openimageio:x64-windows

      - name: Install Python Dependencies
        run: |
          ${{ matrix.python }} -m pip install --upgrade pip
          ${{ matrix.python }} -m pip install -r requirements.txt pyinstaller pybind11 pillow

      - name: Compile Native C++ Core
        run: ${{ matrix.python }} build.py

      - name: Generate Build Version Metadata
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: ${{ matrix.python }} scripts/generate_version.py

      - name: Generate Platform Bundle Icons
        run: ${{ matrix.python }} scripts/generate_platform_icons.py

      - name: Freeze Application with PyInstaller
        run: ${{ matrix.python }} -m PyInstaller --clean --noconfirm packaging/framecycler.spec

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Download previous Velopack release
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          vpk download github \
            --repoUrl https://github.com/bernhardkimbacher/Framecycler \
            --channel ${{ matrix.vpk_channel }} \
            || echo "No previous release found (first release for this channel)."

      - name: Create Velopack release (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          vpk pack `
            -u $env:VPK_PACK_ID `
            --packTitle $env:VPK_PACK_TITLE `
            -v ${{ steps.version.outputs.version }} `
            -p dist/Framecycler `
            -e Framecycler.exe `
            -c win `
            --icon assets/icons/app_icon.ico

      - name: Create Velopack release (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          vpk pack \
            -u "$VPK_PACK_ID" \
            --packTitle "$VPK_PACK_TITLE" \
            -v ${{ steps.version.outputs.version }} \
            -p dist/Framecycler-Reboot.app \
            -e Framecycler \
            -c osx \
            --bundleId "$VPK_BUNDLE_ID" \
            --icon assets/icons/app_icon.icns

      - name: Create Velopack release (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          vpk pack \
            -u "$VPK_PACK_ID" \
            --packTitle "$VPK_PACK_TITLE" \
            -v ${{ steps.version.outputs.version }} \
            -p dist/Framecycler \
            -e Framecycler \
            -c linux \
            --icon assets/icons/app_icon_512.png

      - name: Upload Velopack artifacts
        uses: actions/upload-artifact@v4
        with:
          name: velopack-${{ matrix.vpk_channel }}
          path: Releases/**

  publish:
    name: Publish GitHub Release
    needs: build
    if: >-
      github.ref_type == 'tag' &&
      (github.event_name != 'workflow_dispatch' || inputs.publish_release)
    runs-on: ubuntu-latest

    steps:
      - name: Derive release version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Download Velopack artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: velopack-*
          path: artifact-staging
          merge-multiple: true

      - name: Stage release files
        run: |
          mkdir -p Releases
          if [ -d artifact-staging/Releases ]; then
            cp -R artifact-staging/Releases/. Releases/
          else
            cp -R artifact-staging/. Releases/
          fi
          ls -la Releases

      - name: Clear partial release on workflow retry
        if: github.run_attempt > 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v${{ steps.version.outputs.version }}" --yes || true

      - name: Publish Velopack release to GitHub
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for channel in win osx linux; do
            echo "Uploading channel: $channel"
            vpk upload github \
              --repoUrl https://github.com/bernhardkimbacher/Framecycler \
              --channel "$channel" \
              --publish \
              --merge \
              --tag "v${{ steps.version.outputs.version }}" \
              --releaseName "Framecycler ${{ steps.version.outputs.version }}" \
              --token "$GITHUB_TOKEN"
          done

  release-note:
    name: Release publish skipped
    needs: build
    if: >-
      always() &&
      needs.build.result == 'success' &&
      (github.ref_type != 'tag' ||
        (github.event_name == 'workflow_dispatch' && !inputs.publish_release))
    runs-on: ubuntu-latest
    steps:
      - name: Explain skipped publish
        run: |
          echo "::warning::GitHub Release publish was skipped."
          echo "Publish only runs for v* tag refs."
          echo "To release: push a tag (e.g. v0.1.0) or use Run workflow and select the tag ref (not master)."
