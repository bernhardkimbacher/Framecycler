name: Package Framecycler

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish to GitHub Releases (only runs when this workflow is started from a v* tag ref, not master)
        type: boolean
        default: true
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      VPK_PACK_ID: framecycler-reboot
      VPK_PACK_TITLE: Framecycler-Reboot
      VPK_BUNDLE_ID: com.bernhardkimbacher.framecycler-reboot
      VCPKG_INSTALLATION_ROOT: C:\vcpkg
      VCPKG_BUILD_TYPE: release
    strategy:
      fail-fast: true
      matrix:
        os: [windows-2022, macos-14, ubuntu-22.04]
        include:
          - os: windows-2022
            ext: "pyd"
            python: "python"
            vpk_channel: win
          - os: macos-14
            ext: "so"
            python: "python3"
            vpk_channel: osx
          - os: ubuntu-22.04
            ext: "so"
            python: "python3"
            vpk_channel: linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Derive release version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.1-dev.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Derived version: $VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Pins: see packaging/native-deps.md
          sudo apt-get install -y libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-x11-0 libxkbcommon-dev libxcb-cursor0 libopenimageio-dev openimageio-tools libopencv-dev libvulkan-dev libavformat-dev libavcodec-dev libavutil-dev libswscale-dev

      - name: Install System Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # Expected prefixes: openimageio 3.1.*, ffmpeg 8.* (packaging/native-deps.md)
          brew install openimageio ffmpeg

      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
            ${{ env.VCPKG_INSTALLATION_ROOT }}/downloads
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install System Dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "set(VCPKG_BUILD_TYPE release)" >> "$VCPKG_INSTALLATION_ROOT/triplets/x64-windows.cmake"
          vcpkg install --triplet x64-windows --x-manifest-root=.

      - name: Check native dependency pins
        shell: bash
        run: ${{ matrix.python }} scripts/check_native_deps.py --strict

      - name: Cache Qt SDK
        uses: actions/cache@v4
        with:
          path: .qt
          key: ${{ runner.os }}-qt-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-qt-

      - name: Install Python Dependencies
        run: |
          ${{ matrix.python }} -m pip install --upgrade pip
          ${{ matrix.python }} -m pip install -r requirements.txt pyinstaller pybind11 pillow

      - name: Compile Native C++ Core
        run: ${{ matrix.python }} build.py --clean

      - name: Generate Build Version Metadata
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: ${{ matrix.python }} scripts/generate_version.py

      - name: Generate Platform Bundle Icons
        run: ${{ matrix.python }} scripts/generate_platform_icons.py

      - name: Freeze Application with PyInstaller
        run: ${{ matrix.python }} -m PyInstaller --clean --noconfirm packaging/framecycler.spec

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        id: apple_keychain
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        shell: bash
        run: |
          if [ -z "${MACOS_CERTIFICATE_P12}" ] || [ -z "${MACOS_CODESIGN_IDENTITY}" ]; then
            echo "Apple signing secrets not configured; unsigned .app will be packed."
            echo "signed=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/developer_id.p12"
          KEYCHAIN="$RUNNER_TEMP/framecycler.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "KEYCHAIN_PATH=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          echo "MACOS_CODESIGN_IDENTITY=$MACOS_CODESIGN_IDENTITY" >> "$GITHUB_ENV"
          echo "MACOS_ENTITLEMENTS=$GITHUB_WORKSPACE/packaging/macos/entitlements.plist" >> "$GITHUB_ENV"
          echo "signed=1" >> "$GITHUB_OUTPUT"

      - name: Sign and notarize macOS app
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
        run: ${{ matrix.python }} scripts/macos_sign_notarize.py dist/Framecycler-Reboot.app

      - name: Tear down Apple keychain
        if: runner.os == 'macOS' && always()
        shell: bash
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Download previous Velopack release
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          vpk download github \
            --repoUrl https://github.com/bernhardkimbacher/Framecycler \
            --channel ${{ matrix.vpk_channel }} \
            || echo "No previous release found (first release for this channel)."

      # TODO(Authenticode): Sign dist/Framecycler/Framecycler.exe (and shipped DLLs)
      # with a Trusted Signing / Azure code-signing certificate once the org account
      # is provisioned. Then staple/verify before `vpk pack`. Not implemented yet.

      - name: Create Velopack release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vpk pack `
            -u $env:VPK_PACK_ID `
            --packTitle $env:VPK_PACK_TITLE `
            -v ${{ steps.version.outputs.version }} `
            -p dist/Framecycler `
            -e Framecycler.exe `
            -c win `
            --icon assets/icons/app_icon.ico

      - name: Create Velopack release (macOS)
        if: runner.os == 'macOS'
        run: |
          vpk pack \
            -u "$VPK_PACK_ID" \
            --packTitle "$VPK_PACK_TITLE" \
            -v ${{ steps.version.outputs.version }} \
            -p dist/Framecycler-Reboot.app \
            -e Framecycler \
            -c osx \
            --bundleId "$VPK_BUNDLE_ID" \
            --icon assets/icons/app_icon.icns

      - name: Create Velopack release (Linux)
        if: runner.os == 'Linux'
        run: |
          vpk pack \
            -u "$VPK_PACK_ID" \
            --packTitle "$VPK_PACK_TITLE" \
            -v ${{ steps.version.outputs.version }} \
            -p dist/Framecycler \
            -e Framecycler \
            -c linux \
            --icon assets/icons/app_icon_512.png

      - name: Upload Velopack artifacts
        uses: actions/upload-artifact@v4
        with:
          name: velopack-${{ matrix.vpk_channel }}
          path: Releases/**

  publish:
    name: Publish GitHub Release
    needs: build
    if: >-
      github.ref_type == 'tag' &&
      (github.event_name != 'workflow_dispatch' || inputs.publish_release)
    runs-on: ubuntu-latest

    steps:
      - name: Derive release version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Download Velopack artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: velopack-*
          path: artifact-staging
          merge-multiple: true

      - name: Stage release files
        run: |
          mkdir -p Releases
          if [ -d artifact-staging/Releases ]; then
            cp -R artifact-staging/Releases/. Releases/
          else
            cp -R artifact-staging/. Releases/
          fi
          ls -la Releases

      - name: Clear partial release on workflow retry
        if: github.run_attempt > 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v${{ steps.version.outputs.version }}" --yes || true

      - name: Publish Velopack release to GitHub
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for channel in win osx linux; do
            echo "Uploading channel: $channel"
            vpk upload github \
              --repoUrl https://github.com/bernhardkimbacher/Framecycler \
              --channel "$channel" \
              --publish \
              --merge \
              --tag "v${{ steps.version.outputs.version }}" \
              --releaseName "Framecycler ${{ steps.version.outputs.version }}" \
              --token "$GITHUB_TOKEN"
          done

  release-note:
    name: Release publish skipped
    needs: build
    if: >-
      always() &&
      needs.build.result == 'success' &&
      (github.ref_type != 'tag' ||
        (github.event_name == 'workflow_dispatch' && !inputs.publish_release))
    runs-on: ubuntu-latest
    steps:
      - name: Explain skipped publish
        run: |
          echo "::warning::GitHub Release publish was skipped."
          echo "Publish only runs for v* tag refs."
          echo "To release: push a tag (e.g. v0.1.0) or use Run workflow and select the tag ref (not master)."
