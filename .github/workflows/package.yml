name: Package Framecycler

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            ext: "pyd"
            python: "python"
            vpk_channel: win
          - os: macos-latest
            ext: "so"
            python: "python3"
            vpk_channel: osx
          - os: ubuntu-latest
            ext: "so"
            python: "python3"
            vpk_channel: linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Derive release version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.1-dev.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Derived version: $VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-x11-0

      - name: Install Python Dependencies
        run: |
          ${{ matrix.python }} -m pip install --upgrade pip
          ${{ matrix.python }} -m pip install -r requirements.txt pyinstaller pybind11 pillow

      - name: Compile Native C++ Core
        run: ${{ matrix.python }} build.py

      - name: Generate Build Version Metadata
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: ${{ matrix.python }} scripts/generate_version.py

      - name: Generate Platform Bundle Icons
        run: ${{ matrix.python }} scripts/generate_platform_icons.py

      - name: Freeze Application with PyInstaller
        run: ${{ matrix.python }} -m PyInstaller --clean --noconfirm packaging/framecycler.spec

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Download previous Velopack release
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          vpk download github \
            --repoUrl https://github.com/bernhardkimbacher/Framecycler \
            --channel ${{ matrix.vpk_channel }} \
            || echo "No previous release found (first release for this channel)."

      - name: Create Velopack release (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          vpk pack `
            -u com.bernhardkimbacher.framecycler-reboot `
            -v ${{ steps.version.outputs.version }} `
            -p dist/Framecycler `
            -e Framecycler.exe `
            -c win `
            --icon assets/icons/app_icon.ico

      - name: Create Velopack release (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          vpk pack \
            -u com.bernhardkimbacher.framecycler-reboot \
            -v ${{ steps.version.outputs.version }} \
            -p dist/Framecycler.app/Contents \
            -e Framecycler \
            -c osx \
            --bundleId com.bernhardkimbacher.framecycler-reboot \
            --icon assets/icons/app_icon.icns

      - name: Create Velopack release (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          vpk pack \
            -u com.bernhardkimbacher.framecycler-reboot \
            -v ${{ steps.version.outputs.version }} \
            -p dist/Framecycler \
            -e Framecycler \
            -c linux \
            --icon assets/icons/app_icon_512.png

      - name: Publish Velopack release to GitHub
        if: github.ref_type == 'tag'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vpk upload github \
            --repoUrl https://github.com/bernhardkimbacher/Framecycler \
            --channel ${{ matrix.vpk_channel }} \
            --publish \
            --merge \
            --tag v${{ steps.version.outputs.version }} \
            --releaseName "Framecycler ${{ steps.version.outputs.version }}" \
            --token "$GITHUB_TOKEN"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Framecycler-Build-${{ matrix.os }}
          path: |
            Releases/**
