name: Package Framecycler

on:
  # Allows manual triggers from the Actions tab on GitHub
  workflow_dispatch:

  # Optional: Also build when a release version tag is pushed
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            sep: ";"
            ext: "pyd"
            python: "python"
          - os: macos-latest
            sep: ":"
            ext: "so"
            python: "python3"
          - os: ubuntu-latest
            sep: ":"
            ext: "so"
            python: "python3"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-x11-0

      - name: Install Python Dependencies
        run: |
          ${{ matrix.python }} -m pip install --upgrade pip
          ${{ matrix.python }} -m pip install -r requirements.txt pyinstaller pybind11 pillow

      - name: Compile Native C++ Core
        run: ${{ matrix.python }} build.py

      - name: Generate Build Version Metadata
        run: ${{ matrix.python }} scripts/generate_version.py

      - name: Generate Platform Bundle Icons
        run: ${{ matrix.python }} scripts/generate_platform_icons.py

      - name: Freeze Application with PyInstaller
        shell: bash
        run: |
          ICON="assets/icons/app_icon_512.png"
          if [[ "${{ matrix.os }}" == "macos-latest" && -f assets/icons/app_icon.icns ]]; then
            ICON="assets/icons/app_icon.icns"
          elif [[ "${{ matrix.os }}" == "windows-latest" && -f assets/icons/app_icon.ico ]]; then
            ICON="assets/icons/app_icon.ico"
          fi
          ${{ matrix.python }} -m PyInstaller --clean --noconfirm --windowed --name=Framecycler \
            --icon "$ICON" \
            --add-data "src/framecycler/color/studio_config${{ matrix.sep }}framecycler/color/studio_config" \
            --add-data "assets/icons${{ matrix.sep }}assets/icons" \
            --add-binary "src/framecycler/framecycler_engine*.${{ matrix.ext }}${{ matrix.sep }}framecycler" \
            src/framecycler/__main__.py

      - name: Set macOS Bundle Display Name
        if: matrix.os == 'macos-latest'
        run: |
          PLIST="dist/Framecycler.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName 'Framecycler Reboot'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName 'Framecycler Reboot'" "$PLIST"

      # Windows Installer Packaging
      - name: Package Windows Installer
        if: matrix.os == 'windows-latest'
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      # macOS zip packaging
      - name: Package macOS Artifacts
        if: matrix.os == 'macos-latest'
        run: |
          zip -r dist/Framecycler-macOS.zip dist/Framecycler.app

      # Linux zip packaging
      - name: Package Linux Artifacts
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -czvf dist/Framecycler-Linux.tar.gz -C dist/ Framecycler

      # Upload Build Artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Framecycler-Build-${{ matrix.os }}
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/*Installer.exe
