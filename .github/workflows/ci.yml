name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      VCPKG_INSTALLATION_ROOT: C:\vcpkg
      VCPKG_BUILD_TYPE: release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
        include:
          - os: ubuntu-22.04
            python: python3
          - os: macos-14
            python: python3
          - os: windows-2022
            python: python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Pins: see packaging/native-deps.md (Ubuntu image packages).
          sudo apt-get install -y libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-x11-0 libxkbcommon-dev libxcb-cursor0 libopenimageio-dev openimageio-tools libopencv-dev libvulkan-dev libavformat-dev libavcodec-dev libavutil-dev libswscale-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # Expected prefixes: openimageio 3.1.*, ffmpeg 8.* (packaging/native-deps.md)
          brew install openimageio ffmpeg

      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
            ${{ env.VCPKG_INSTALLATION_ROOT }}/downloads
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Runner C:\vcpkg is a shallow/stale clone. Fetch + hard-reset to the
          # pinned builtin-baseline so ports/ and versions/ match baseline.json
          # (fetch alone still leaves the on-disk version DB behind).
          BASELINE=$(${{ matrix.python }} -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")
          git -C "$VCPKG_INSTALLATION_ROOT" fetch --depth=1 origin "$BASELINE"
          git -C "$VCPKG_INSTALLATION_ROOT" reset --hard FETCH_HEAD
          cmd.exe //c "cd /d %VCPKG_INSTALLATION_ROOT% && bootstrap-vcpkg.bat -disableMetrics"
          echo "set(VCPKG_BUILD_TYPE release)" >> "$VCPKG_INSTALLATION_ROOT/triplets/x64-windows.cmake"
          # Manifest mode: pinned openimageio + ffmpeg via vcpkg.json
          vcpkg install --triplet x64-windows --x-manifest-root=.

      - name: Check native dependency pins
        shell: bash
        run: ${{ matrix.python }} scripts/check_native_deps.py --strict

      - name: Cache Qt SDK
        uses: actions/cache@v4
        with:
          path: .qt
          key: ${{ runner.os }}-qt-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-qt-

      - name: Install Python dependencies
        run: |
          ${{ matrix.python }} -m pip install --upgrade pip
          ${{ matrix.python }} -m pip install -r requirements.txt

      - name: Compile native C++ core
        run: ${{ matrix.python }} build.py --clean

      - name: Diagnose missing DLLs (temporary)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dumpbin = (Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC" -Filter dumpbin.exe -Recurse | Select-Object -First 1).FullName
          $pyd = (Get-ChildItem src\framecycler\framecycler_engine*.pyd | Select-Object -First 1).FullName
          & $dumpbin /dependents $pyd
          Get-ChildItem src\framecycler\*.dll

      - name: Run unit tests
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          test_modules=()
          while IFS= read -r module; do
            test_modules+=("tests.${module}")
          done < <(find tests -maxdepth 1 -name 'test_*.py' \
            -exec basename {} .py \; | sort)
          ${{ matrix.python }} -m unittest -v "${test_modules[@]}"

      - name: GPU present smoke
        if: runner.os == 'macOS' || runner.os == 'Windows'
        shell: bash
        env:
          FRAMECYCLER_REQUIRE_GPU: "1"
        run: ${{ matrix.python }} -m unittest -v tests.test_gpu_present_smoke
        continue-on-error: true

      - name: Soft perf benchmarks
        shell: bash
        run: |
          mkdir -p artifacts/perf
          ${{ matrix.python }} scripts/benchmark_movie_convert.py --frames 10 \
            --json-out artifacts/perf/movie_convert.json || true
          ${{ matrix.python }} scripts/benchmark_exr_proxy.py --frames 5 --size 512x512 \
            --json-out artifacts/perf/exr_proxy.json || true
          ${{ matrix.python }} scripts/ci_soft_perf_gate.py --results-dir artifacts/perf
        continue-on-error: true
