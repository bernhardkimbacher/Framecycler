name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      VCPKG_INSTALLATION_ROOT: C:\vcpkg
      VCPKG_BUILD_TYPE: release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
        include:
          - os: ubuntu-22.04
            python: python3
          - os: macos-14
            python: python3
          - os: windows-2022
            python: python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0 libopenimageio-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install openimageio

      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
            ${{ env.VCPKG_INSTALLATION_ROOT }}/downloads
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "set(VCPKG_BUILD_TYPE release)" >> "$VCPKG_INSTALLATION_ROOT/triplets/x64-windows.cmake"
          vcpkg install openimageio:x64-windows

      - name: Cache Qt SDK
        uses: actions/cache@v4
        with:
          path: .qt
          key: ${{ runner.os }}-qt-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-qt-

      - name: Install Python dependencies
        run: |
          ${{ matrix.python }} -m pip install --upgrade pip
          ${{ matrix.python }} -m pip install -r requirements.txt

      - name: Compile native C++ core
        run: ${{ matrix.python }} build.py

      - name: Debug Qt SDK layout (temporary)
        if: always() && runner.os == 'Linux'
        run: find .qt -iname "qrhi.h" -o -iname "qshaderbaker.h" -o -iname "qtshadertools*" || true

      - name: Run unit tests
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          test_modules=()
          while IFS= read -r module; do
            test_modules+=("tests.${module}")
          done < <(find tests -maxdepth 1 -name 'test_*.py' \
            -exec basename {} .py \; | sort)
          ${{ matrix.python }} -m unittest -v "${test_modules[@]}"
